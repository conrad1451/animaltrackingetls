name: Secure Database Backup

# CHQ: Gemini AI generated, Claude AI debugged

on:
  schedule:
    - cron: "0 14 * * 0"
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch Secrets from Infisical
        uses: infisical/secrets-action@v1.0.15
        with:
          method: "oidc"
          identity-id: "00365bb9-278e-41e8-926d-3ee1419e2263"
          env-slug: "prod"
          project-slug: "monarch-and-other-projects-yy-1y"
          oidc-audience: "https://app.infisical.com"

      - name: Debug Secrets
        run: |
          if [ -n "$DATABASE_URL" ]; then
          echo "DATABASE_URL is set ✅"
          else
          echo "DATABASE_URL is empty ❌"
          fi
          env | grep -i database || echo "none found"

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create Database Dump
        run: |
          DB_CONN="${DATABASE_URL:-$database_url}"
          if [ -z "$DB_CONN" ]; then
            echo "❌ ERROR: Database connection string is empty!"
            exit 1
          fi
          echo "✅ Database URL resolved. Running pg_dump..."
          PGSSLMODE=require pg_dump -d "$DB_CONN" -F c -b -v -f "backup_$(date +%F_%H-%M-%S).sql"

      - name: Configure AWS CLI for Cloudflare R2
        run: |
          aws configure set aws_access_key_id "${R2_ACCESS_KEY_ID:-$r2_access_key_id}"
          aws configure set aws_secret_access_key "${R2_SECRET_ACCESS_KEY:-$r2_secret_access_key}"
          aws configure set default.region auto

      - name: Upload Backup to Cloudflare R2
        run: |
          BUCKET="${R2_BUCKET_NAME:-$r2_bucket_name}"
          ENDPOINT="${R2_ENDPOINT_URL:-$r2_endpoint_url}"
          aws s3 cp backup_*.sql "s3://$BUCKET/backups/" --endpoint-url "$ENDPOINT"
