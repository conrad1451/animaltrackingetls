name: Secure Database Backup

# CHQ: Gemini AI generated

on:
  schedule:
    - cron: "0 14 * * 0" # Runs every day at 14:00 UTC (10:00 AM EDT)
  workflow_dispatch: # Allows you to run it manually anytime

permissions:
  id-token: write # CRITICAL: Allows GitHub to securely authenticate with Infisical without a password
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Fetch Secrets dynamically from Infisical using OIDC
      - name: Fetch Secrets from Infisical
        uses: infisical/secrets-action@v1.0.9
        with:
          method: "oidc"
          identity-id: "00365bb9-278e-41e8-926d-3ee1419e2263"
          env-slug: "prod"
          project-slug: "monarch-and-other-projects-yy-1y"
          oidc-audience: "https://app.infisical.com"

      # 2. Install Database Tools & AWS CLI
      - name: Install Database Tools & AWS CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      # 3. Create the backup file and encrypt it immediately
      - name: Create Encrypted Database Dump
        run: |
          pg_dump -d "$database_url" -F c -b -v -f backup.sql
          echo "$database_url" | gpg --batch --yes --passphrase-fd 0 -c -o backup_$(date +%F_%H-%M-%S).sql.gpg backup.sql
          shred -u backup.sql

      # 4. Configure AWS CLI for Cloudflare R2 using safe shell variables
      - name: Configure AWS CLI for Cloudflare R2
        run: |
          aws configure set aws_access_key_id "$r2_access_key_id"
          aws configure set aws_secret_access_key "$r2_secret_access_key"
          aws configure set default.region auto

      # 5. Upload Encrypted Backup to Cloudflare R2
      - name: Upload Encrypted Backup to Cloudflare R2
        run: |
          aws s3 cp backup_*.sql.gpg "$r2_bucket_url" --endpoint-url "$r2_bucket_url"
